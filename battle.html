<!DOCTYPE html>
<html lang="en">
<head>
    <title>Battle</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            
            display: flex;
            justify-content: center; 
            align-items: center;     
    
        }
        #battleScreen {
            position: absolute;
            max-width: 100%;
            max-height: 100vh; 
            object-fit: contain;
            
        }
    </style>


</head>
<body>
    
    <div id="musicHint"
        style="position:absolute; top:20px; left:20px; 
                color:white; font-size:24px;">
        Press M to toggle music
    </div>
    <div id="volume"
        style="position:absolute; top:20px; right:20px; 
                color:white; font-size:24px;">
        Press &#9650; / &#9660; to change volume 
    </div>

    <canvas width="1700" height="1020" id="battleScreen"></canvas>
    

    <script src="battle.js"></script>
    <script src="training.js"></script>
    
</body>
</html>
