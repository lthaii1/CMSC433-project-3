<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Gacha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #2c3e91;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05) 0, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05) 0, transparent 50%);
            font-family: 'Press Start 2P', monospace;
            color: white;
            text-align: center;
            padding-top: 30px;
            margin: 0;
        }

        h1 {
            color: #ffcb05;
            text-shadow: 3px 3px 0 #2a5fb0, -2px -2px 0 #2a5fb0;
            font-size: 28px;
            letter-spacing: 2px;
        }

        #coinDisplay {
            font-size: 14px;
            margin: 20px 0;
            background: #ffffff;
            color: #2c3e91;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            border: 4px solid #2c3e91;
        }

        #machine {
            width: 280px;
            margin: 20px auto;
            background: #d72525;
            border: 6px solid #8a1414;
            border-radius: 16px;
            padding: 20px;
            box-shadow: inset 0 0 0 4px #ffcb05;
        }

        #machineScreen {
            background: #1a1a1a;
            border: 4px solid #333;
            border-radius: 8px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        #resultBox img {
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
        }

        #resultBox p, #resultBox h2, #resultBox h3 {
            margin: 6px 0;
        }

        #resultBox h3 {
            font-size: 12px;
            color: #ffcb05;
        }

        .rarity-common { color: #b0b0b0; font-size: 10px; }
        .rarity-rare { color: #5dade2; font-size: 10px; }
        .rarity-legendary {
            color: #ffcb05;
            font-size: 10px;
            text-shadow: 0 0 6px #ffcb05;
        }

        #pullButton {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 14px 24px;
            margin-top: 20px;
            background: #ffcb05;
            color: #2c3e91;
            border: 4px solid #c79b00;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c79b00;
        }

        #pullButton:active {
            box-shadow: 0 1px 0 #c79b00;
            transform: translateY(3px);
        }

        #pullButton:disabled {
            background: #999;
            border-color: #666;
            box-shadow: 0 4px 0 #666;
            cursor: default;
        }

        #backLink {
            display: inline-block;
            margin-top: 30px;
            color: #ffffff;
            font-size: 10px;
            text-decoration: none;
            border-bottom: 2px solid #ffcb05;
            padding-bottom: 2px;
        }

        #backLink:hover {
            color: #ffcb05;
        }

        .placeholder-text {
            font-size: 11px;
            color: #888;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .shaking {
            animation: shake 0.15s infinite;
        }
    </style>
</head>
<body>

    <h1>Pokemon Gacha</h1>
    <div id="coinDisplay">Coins: loading...</div>

    <div id="machine">
        <div id="machineScreen">
            <div id="resultBox">
                <p class="placeholder-text">Press pull to begin!</p>
            </div>
        </div>
        <button id="pullButton">Pull (10 coins)</button>
    </div>

    <a id="backLink" href="openworld.html">&lt; Back to World</a>

    <script>
        var playerName = localStorage.getItem("playerName");

        var pullButton = document.getElementById("pullButton");
        var resultBox = document.getElementById("resultBox");
        var coinDisplay = document.getElementById("coinDisplay");

        function loadCoins() {
            fetch("getCoins.php?playerName=" + encodeURIComponent(playerName))
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        coinDisplay.textContent = "Coins: " + data.currency;
                    } else {
                        coinDisplay.textContent = "Coins: --";
                    }
                });
        }

        loadCoins();

        pullButton.addEventListener("click", function () {
            pullButton.disabled = true;
            resultBox.innerHTML = "<p class='placeholder-text shaking'>Pulling...</p>";

            fetch("gamble.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ playerName: playerName })
            })
            .then(response => response.json())
            .then(data => {
                pullButton.disabled = false;

                if (!data.success) {
                    resultBox.innerHTML = "<p class='placeholder-text'>" + data.message + "</p>";
                    return;
                }

                var p = data.pokemon;
                var rarityClass = "rarity-" + p.rarity;

                var html = "";
                html += "<img src='" + p.image_path + "' alt='" + p.name + "'>";
                html += "<h3>" + p.name + "</h3>";
                html += "<p class='" + rarityClass + "'>" + p.rarity.toUpperCase() + "</p>";
                if (data.alreadyOwned) {
                    html += "<p class='placeholder-text'>(already owned)</p>";
                }

                resultBox.innerHTML = html;
                coinDisplay.textContent = "Coins: " + data.remainingCoins;
            })
            .catch(err => {
                pullButton.disabled = false;
                resultBox.innerHTML = "<p class='placeholder-text'>Something went wrong.</p>";
                console.error(err);
            });
        });
    </script>

</body>
</html>
