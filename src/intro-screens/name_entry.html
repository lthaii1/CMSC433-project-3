<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon - Enter Name</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('../../imgs/intro-screens/title-background.jpg') no-repeat center center/cover;
            filter: blur(8px);
            transform: scale(1.1);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h2 {
            font-size: 3rem;
            color: #ffcb05;
            -webkit-text-stroke: 2px #3b4cca;
            margin: 0 0 2rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .character-preview {
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        input[type="text"] {
            font-size: 1.5rem;
            padding: 12px 20px;
            border: 4px solid #3b4cca;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #fff;
            text-align: center;
            width: 300px;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #ffcb05;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 3rem;
        }

        .btn {
            font-size: 1.5rem;
            color: #888;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            padding: 10px 20px;
            transition: color 0.2s;
        }

        .btn:hover {
            color: #fff;
        }

        .confirm-btn {
            color: #ffcb05;
        }

        .confirm-btn:hover {
            color: #fff;
            text-shadow: 0 0 10px #ffcb05;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <h2>Enter Your Name</h2>
        
        <img id="sprite-preview" class="character-preview" src="" alt="Selected Player">

        <div class="input-container">
            <input type="text" id="name-input" placeholder="YOUR NAME" maxlength="12" autofocus>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="window.location.href='character_select.html'">Back</button>
            <button class="btn confirm-btn" onclick="confirmName()">Confirm</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gender = params.get('gender') || 'Male';
        
        const spriteEl = document.getElementById("sprite-preview");
        if (gender === 'Female') {
            spriteEl.src = "https://archives.bulbagarden.net/media/upload/0/00/Spr_DP_Dawn.png";
        } else {
            spriteEl.src = "https://archives.bulbagarden.net/media/upload/9/9d/Spr_DP_Lucas.png";
        }

        function confirmName() {
            const name = document.getElementById("name-input").value.trim();
            if (!name) {
                alert("Please enter a name!");
                return;
            }
            // Save active player name
            localStorage.setItem("playerName", name);

            alert("Welcome, " + name + "! Your journey begins!");
        }
    </script>
</body>
</html>
