<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon - Character Selection</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('../../imgs/intro-screens/title-background.jpg') no-repeat center center/cover;
            filter: blur(8px);
            transform: scale(1.1);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h2 {
            font-size: 3rem;
            color: #ffcb05;
            -webkit-text-stroke: 2px #3b4cca;
            margin: 0 0 3rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .selection-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 40px;
        }

        .character-card {
            background: rgba(0, 0, 0, 0.6);
            border: 4px solid #3b4cca;
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            width: 200px;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-card:hover {
            transform: scale(1.05);
            border-color: #ffcb05;
            box-shadow: 0 0 15px #ffcb05;
        }

        .character-sprite {
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
            margin-bottom: 20px;
        }

        .character-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .character-card:hover .character-name {
            color: #ffcb05;
        }

        .back-btn {
            margin-top: 3rem;
            font-size: 1.2rem;
            color: #888;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: underline;
        }

        .back-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <h2>Choose Your Character</h2>
        
        <div class="selection-container">
            <!-- Male Character -->
            <div class="character-card" onclick="selectCharacter('Male')">
                <img class="character-sprite" src="https://archives.bulbagarden.net/media/upload/9/9d/Spr_DP_Lucas.png" alt="Male Player">
                <div class="character-name">Male</div>
            </div>

            <!-- Female Character -->
            <div class="character-card" onclick="selectCharacter('Female')">
                <img class="character-sprite" src="https://archives.bulbagarden.net/media/upload/0/00/Spr_DP_Dawn.png" alt="Female Player">
                <div class="character-name">Female</div>
            </div>
        </div>

        <button class="back-btn" onclick="window.location.href='title_screen.html'">Back</button>
    </div>

    <script>
        function selectCharacter(gender) {
            alert("You selected the " + gender + " character!");
        }
    </script>
</body>
</html>
