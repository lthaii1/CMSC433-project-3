<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Title Screen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('../../imgs/intro-screens/title-background.jpg') no-repeat center center/cover;
            filter: blur(8px);
            transform: scale(1.1);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 7rem;
            font-weight: bold;
            color: #ffcb05;
            -webkit-text-stroke: 4px #3b4cca;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #111;
            margin-top: 10px;
            margin-bottom: 40px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .start-btn {
            font-size: 1.8rem;
            color: #444;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            padding: 10px 20px;
            transition: color 0.2s;
        }

        .start-btn:hover {
            color: #fff;
        }

        .menu-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .menu-btn {
            font-size: 1.8rem;
            color: #ffcb05;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #3b4cca;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            padding: 10px 30px;
            transition: all 0.2s;
            letter-spacing: 1px;
            width: 280px;
        }

        .menu-btn:hover {
            border-color: #ffcb05;
            box-shadow: 0 0 10px #ffcb05;
            color: #fff;
            transform: scale(1.05);
        }

        .save-list-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .save-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            border: 3px solid #3b4cca;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.8);
            width: 280px;
        }

        .save-item {
            font-size: 1.3rem;
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
            text-align: center;
        }

        .save-item:hover {
            background-color: #3b4cca;
            color: #ffcb05;
            border-color: #ffcb05;
        }

        .back-btn {
            font-size: 1.2rem;
            color: #888;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 15px;
            text-decoration: underline;
        }

        .back-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <div class="title">Pokémon</div>
        <div class="subtitle">CMSC433 | Group 1</div>
        
        <button id="start-button" class="start-btn" onclick="handleStart()">Click to Start</button>

        <div id="menu-options" class="menu-container">
            <button class="menu-btn" onclick="window.location.href='name_entry.html'">New Game</button>
            <button id="continue-btn" class="menu-btn" onclick="showSaves()">Continue Game</button>
        </div>

        <div id="save-list-container" class="save-list-container">
            <div id="save-list" class="save-list"></div>
            <button class="back-btn" onclick="goBackToMenu()">Back</button>
        </div>
    </div>

    <script>
        function getSavedNames() {
            let savedNames = [];
            try {
                const stored = localStorage.getItem("savedNames");
                if (stored) {
                    savedNames = JSON.parse(stored);
                } else {
                    const player = localStorage.getItem("playerName");
                    if (player) {
                        savedNames = [player];
                        localStorage.setItem("savedNames", JSON.stringify(savedNames));
                    }
                }
            } catch (e) {
                console.error("Error loading savedNames:", e);
            }
            return savedNames;
        }

        function handleStart() {
            const savedNames = getSavedNames();
            document.getElementById("start-button").style.display = "none";
            
            if (savedNames.length > 0) {
                // If there is a save game present, show New Game and Continue Game
                document.getElementById("menu-options").style.display = "flex";
                document.getElementById("continue-btn").style.display = "block";
            } else {
                // If not, only option should be New Game
                document.getElementById("menu-options").style.display = "flex";
                document.getElementById("continue-btn").style.display = "none";
            }
        }

        function showSaves() {
            document.getElementById("menu-options").style.display = "none";
            const saveListContainer = document.getElementById("save-list-container");
            const listEl = document.getElementById("save-list");
            listEl.innerHTML = "";

            const savedNames = getSavedNames();
            savedNames.forEach(name => {
                const item = document.createElement("div");
                item.className = "save-item";
                item.textContent = name;
                item.onclick = function() {
                    localStorage.setItem("playerName", name);
                    alert("Welcome back, " + name + "! Your journey continues!");
                };
                listEl.appendChild(item);
            });

            saveListContainer.style.display = "flex";
        }

        function goBackToMenu() {
            document.getElementById("save-list-container").style.display = "none";
            document.getElementById("menu-options").style.display = "flex";
        }
    </script>
</body>
</html>
