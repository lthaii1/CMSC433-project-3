<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Title Screen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('../../imgs/intro-screens/title-background.jpg') no-repeat center center/cover;
            filter: blur(8px);
            transform: scale(1.1);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 7rem;
            font-weight: bold;
            color: #ffcb05;
            -webkit-text-stroke: 4px #3b4cca;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #111;
            margin-top: 10px;
            margin-bottom: 40px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .start-btn {
            font-size: 1.8rem;
            color: #444;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            padding: 10px 20px;
            transition: color 0.2s;
        }

        .start-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <div class="title">Pokémon</div>
        <div class="subtitle">CMSC433 | Group 1</div>
        <button class="start-btn" onclick="window.location.href='character_select.html'">Click to Start</button>
    </div>

</body>
</html>
